<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;--border:#252a38;--accent:#c8f55a;--accent2:#5af5c8;--accent3:#f5a35a;--text:#e8eaf0;--muted:#6b7280;--danger:#f55a7a;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-header{display:flex;align-items:center;gap:24px;padding:0 28px;height:58px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.header-logo{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--text);text-decoration:none;cursor:pointer}
.header-logo span{color:var(--accent)}
.header-nav{display:flex;gap:4px;flex:1}
.nav-link{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;border:none;background:none}
.nav-link:hover,.nav-link.active{color:var(--text);background:var(--surface2)}
.header-user{display:flex;align-items:center;gap:12px;margin-left:auto}
.user-name{font-size:.82rem;color:var(--muted)}
.page-content{max-width:1100px;margin:0 auto;padding:32px 24px 80px}
.page-title{font-family:'DM Serif Display',serif;font-size:2rem;letter-spacing:-.5px}
.page-title .accent{color:var(--accent)}
.page-sub{color:var(--muted);font-size:.875rem;margin-top:4px}
.welcome-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.btn{font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;border-radius:6px;padding:10px 18px;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#0d0f14;font-weight:600}
.btn-primary:hover:not(:disabled){background:#d4ff6a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,245,90,.25)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:6px 12px;font-size:.68rem}
.btn-danger-outline{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 20px}
.accent-card{border-color:rgba(200,245,90,.2);background:linear-gradient(135deg,var(--surface) 0%,rgba(200,245,90,.04) 100%)}
.stat-icon{font-size:1.4rem;margin-bottom:8px}
.stat-value{font-family:'DM Serif Display',serif;font-size:2.2rem;line-height:1}
.stat-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.mini-bar-wrap{background:var(--border);border-radius:99px;height:4px;overflow:hidden;margin-top:12px}
.mini-bar{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.principles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.principle-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .2s,box-shadow .2s;display:flex}
.principle-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.card-strip{width:4px;flex-shrink:0}
.card-body{flex:1;padding:16px 18px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.card-name{font-weight:600;font-size:.95rem}
.card-desc{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.card-actions{display:flex;gap:4px;flex-shrink:0}
.card-progress{display:flex;align-items:center;gap:10px;margin:10px 0}
.pct-label{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:600;min-width:32px;text-align:right}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.meta-chip{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
.link-btn{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);cursor:pointer;border:none;background:none;text-decoration:none}
.link-btn:hover{text-decoration:underline}
.semester-tag{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:1px;text-transform:uppercase;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:2px 8px;color:var(--muted);display:inline-block;margin-top:3px;margin-right:3px}
.archived-tag{font-family:'DM Mono',monospace;font-size:.6rem;background:rgba(245,90,122,.1);border:1px solid var(--danger);border-radius:99px;padding:2px 8px;color:var(--danger);display:inline-block;margin-top:3px}
.icon-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .15s}
.icon-btn:hover{color:var(--text);border-color:var(--muted)}
.icon-btn.danger:hover{color:var(--danger);border-color:var(--danger)}
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:22px}
.filter-btn{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:1px;text-transform:uppercase;background:transparent;border:1px solid var(--border);border-radius:99px;color:var(--muted);padding:5px 14px;cursor:pointer;transition:all .15s}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.search-input{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:.85rem;padding:8px 14px;outline:none;transition:border-color .15s;width:240px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.toggle-label{font-size:.82rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:.9rem;padding:10px 14px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
textarea.form-input{resize:vertical}
select.form-input{cursor:pointer}
.form-error-msg{display:block;font-size:.75rem;color:var(--danger);margin-top:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);animation:fadeIn .2s}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:30px;width:100%;max-width:460px;animation:scaleIn .2s;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:20px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-swatch:hover,.color-swatch.selected{border-color:white;transform:scale(1.2)}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:38px 34px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:22px}
.auth-logo span{color:var(--accent)}
.auth-card h2{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:6px}
.auth-sub{color:var(--muted);font-size:.875rem;margin-bottom:26px}
.auth-footer{text-align:center;font-size:.82rem;color:var(--muted);margin-top:18px}
.auth-footer a{color:var(--accent);cursor:pointer;text-decoration:none}
.detail-header{margin-bottom:24px}
.detail-title-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.back-link{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);cursor:pointer;border:none;background:none;display:inline-block;margin-bottom:14px;padding:0}
.back-link:hover{color:var(--text)}
.detail-progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 26px;margin-bottom:22px}
.dp-label{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.dp-row{display:flex;align-items:center;gap:16px}
.big-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:8px;overflow:hidden}
.big-bar{height:100%;border-radius:99px;transition:width .6s}
.dp-pct{font-family:'DM Serif Display',serif;font-size:1.8rem;line-height:1}
.dp-meta{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:8px}
.add-task-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;margin-bottom:18px}
.section-title{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.add-task-row{display:flex;gap:8px;flex-wrap:wrap}
.priority-select{max-width:130px;flex-shrink:0}
.due-input{max-width:160px;flex-shrink:0;color-scheme:dark}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-row{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 15px;transition:all .15s}
.task-row:hover{background:var(--surface2)}
.task-row.task-done{opacity:.6}
.task-check{appearance:none;-webkit-appearance:none;width:18px;height:18px;border:1.5px solid var(--border);border-radius:5px;cursor:pointer;margin-top:2px;flex-shrink:0;position:relative;transition:all .15s;background:transparent}
.task-check:checked{background:var(--accent);border-color:var(--accent)}
.task-check:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#0d0f14;font-weight:700}
.task-body{flex:1;min-width:0}
.task-text{font-size:.875rem;display:block;word-break:break-word}
.task-done .task-text{text-decoration:line-through;color:var(--muted)}
.task-edit-input{width:100%;background:var(--surface2);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:.875rem;padding:3px 8px;outline:none}
.task-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.task-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-row:hover .task-actions{opacity:1}
.prio-select{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:.72rem;padding:3px 6px;cursor:pointer;outline:none;flex-shrink:0;margin-top:2px}
.priority-low{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent2);background:rgba(90,245,200,.08);border:1px solid rgba(90,245,200,.2);border-radius:99px;padding:1px 8px}
.priority-med{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent);background:rgba(200,245,90,.08);border:1px solid rgba(200,245,90,.2);border-radius:99px;padding:1px 8px}
.priority-high{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--danger);background:rgba(245,90,122,.08);border:1px solid rgba(245,90,122,.2);border-radius:99px;padding:1px 8px}
.due-chip{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--accent3)}
.done-chip{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;animation:slideUp .3s ease}
.toast-success{background:var(--surface);border:1px solid var(--accent);color:var(--accent)}
.toast-error{background:var(--surface);border:1px solid var(--danger);color:var(--danger)}
.toast-info{background:var(--surface);border:1px solid var(--accent2);color:var(--accent2)}
.skeleton-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.skeleton-card{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r);height:180px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
.empty-state h3{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text);margin-bottom:8px}
.empty-icon{font-size:2.5rem;margin-bottom:14px}
.sem-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.sem-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 16px}
.sem-name{font-weight:600;min-width:110px;font-size:.875rem}
.sem-bar-wrap{flex:1;background:var(--border);border-radius:99px;height:6px;overflow:hidden}
.sem-bar{height:100%;border-radius:99px;transition:width .5s}
.sem-pct{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent);min-width:38px;text-align:right}
.sem-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);min-width:80px;text-align:right}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:640px){.app-header{padding:0 14px;gap:12px}.page-content{padding:20px 14px 60px}.add-task-row{flex-direction:column}.stats-grid{grid-template-columns:1fr 1fr}.user-name{display:none}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-container" id="toasts"></div>

<script>
const API = '/api';
const COLORS = ['#c8f55a','#5af5c8','#f5a35a','#f55a7a','#a35af5','#5ab4f5','#f5e55a','#5af57a','#f55af0','#ff8c42'];
const SEMS = ['Semester 1','Semester 2','Semester 3','Semester 4','Semester 5','Semester 6','Semester 7','Semester 8'];
let _user = null, _access = null, _refresh = null;
let _page = 'login';
let _principles = [], _stats = null, _currentPrinciple = null;
let _filterSearch = '', _filterArchived = false, _filterDone = null;
let _editingTaskId = null, _showPrincipalModal = false, _editingPrinciple = null;
let _toastId = 0;

// ── Storage ──────────────────────────────────────────────────
function saveAuth(a,r,u){_access=a;_refresh=r;_user=u;localStorage.setItem('ut_a',a);localStorage.setItem('ut_r',r);localStorage.setItem('ut_u',JSON.stringify(u))}
function loadAuth(){_access=localStorage.getItem('ut_a');_refresh=localStorage.getItem('ut_r');try{_user=JSON.parse(localStorage.getItem('ut_u'))}catch(e){}}
function clearAuth(){_access=_refresh=_user=null;localStorage.removeItem('ut_a');localStorage.removeItem('ut_r');localStorage.removeItem('ut_u')}

// ── API ───────────────────────────────────────────────────────
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(_access && !path.includes('login') && !path.includes('register'))
    opts.headers['Authorization']='Bearer '+_access;
  if(body) opts.body=JSON.stringify(body);
  let res=await fetch(API+path,opts);
  if(res.status===401 && _refresh && !path.includes('token')){
    const r=await fetch(API+'/auth/token/refresh/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh:_refresh})});
    if(r.ok){const d=await r.json();_access=d.access;localStorage.setItem('ut_a',d.access);opts.headers['Authorization']='Bearer '+_access;res=await fetch(API+path,opts);}
    else{clearAuth();navigate('login');return null;}
  }
  if(res.status===204) return {};
  return res.ok ? res.json() : Promise.reject(await res.json());
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg,type='success'){
  const id=++_toastId;
  const el=document.createElement('div');
  el.className='toast toast-'+type;
  el.textContent=msg;
  el.onclick=()=>el.remove();
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

// ── Router ────────────────────────────────────────────────────
function navigate(page,data){
  _page=page;
  if(data!==undefined) window._pageData=data;
  render();
}

function getProgressColor(p){return p===100?'#5af5c8':p>=50?'#c8f55a':'#f5a35a'}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  if(!_user && _page!=='register'){root.innerHTML=renderLogin();return;}
  if(_page==='register'){root.innerHTML=renderRegister();return;}
  if(_page==='dashboard'){root.innerHTML=renderHeader()+renderDashboard();}
  else if(_page==='principles'){root.innerHTML=renderHeader()+renderPrinciples();}
  else if(_page==='detail'){root.innerHTML=renderHeader()+renderDetail();}
  if(_showPrincipalModal) root.innerHTML+=renderPrincipleModal();
}

// ── AUTH PAGES ────────────────────────────────────────────────
function renderLogin(){return`<div class="auth-wrap"><div class="auth-card">
<div class="auth-logo">Uni<span>Track</span></div>
<h2>Sign in</h2><p class="auth-sub">Track your academic progress</p>
<div class="form-group"><label class="form-label">Email</label><input class="form-input" id="le" type="email" placeholder="you@university.edu"></div>
<div class="form-group"><label class="form-label">Password</label><input class="form-input" id="lp" type="password" placeholder="••••••••"></div>
<div id="lerr" style="color:var(--danger);font-size:.8rem;margin-bottom:10px"></div>
<button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
<p class="auth-footer">No account? <a onclick="navigate('register')">Register</a></p>
</div></div>`}

async function doLogin(){
  const e=document.getElementById('le').value.trim();
  const p=document.getElementById('lp').value;
  if(!e||!p){document.getElementById('lerr').textContent='Fill in all fields';return;}
  try{const d=await api('POST','/auth/login/',{email:e,password:p});saveAuth(d.access,d.refresh,d.user);navigate('dashboard');loadDashboard();}
  catch(err){document.getElementById('lerr').textContent='Invalid email or password';}
}

function renderRegister(){return`<div class="auth-wrap"><div class="auth-card">
<div class="auth-logo">Uni<span>Track</span></div>
<h2>Create account</h2><p class="auth-sub">Start your academic journey</p>
<div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="rn" placeholder="Your name"></div>
<div class="form-group"><label class="form-label">Email</label><input class="form-input" id="re" type="email" placeholder="you@university.edu"></div>
<div class="form-group"><label class="form-label">University <span style="opacity:.6;font-size:.6rem">(optional)</span></label><input class="form-input" id="ru" placeholder="e.g. MIT"></div>
<div class="form-group"><label class="form-label">Password</label><input class="form-input" id="rp" type="password" placeholder="Min 6 characters"></div>
<div class="form-group"><label class="form-label">Confirm Password</label><input class="form-input" id="rp2" type="password" placeholder="Repeat password"></div>
<div id="rerr" style="color:var(--danger);font-size:.8rem;margin-bottom:10px"></div>
<button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
<p class="auth-footer">Have account? <a onclick="navigate('login')">Sign in</a></p>
</div></div>`}

async function doRegister(){
  const n=document.getElementById('rn').value.trim();
  const e=document.getElementById('re').value.trim();
  const u=document.getElementById('ru').value.trim();
  const p=document.getElementById('rp').value;
  const p2=document.getElementById('rp2').value;
  const err=document.getElementById('rerr');
  if(!n||!e||!p){err.textContent='Name, email and password are required';return;}
  if(p!==p2){err.textContent='Passwords do not match';return;}
  if(p.length<6){err.textContent='Password must be at least 6 characters';return;}
  try{await api('POST','/auth/register/',{full_name:n,email:e,university:u,password:p,password2:p2});toast('Account created! Sign in.');navigate('login');}
  catch(ex){const msg=Object.values(ex||{}).flat().join(' ');err.textContent=msg||'Registration failed';}
}

// ── HEADER ────────────────────────────────────────────────────
function renderHeader(){return`<header class="app-header">
<div class="header-logo" onclick="navigate('dashboard');loadDashboard()">Uni<span>Track</span></div>
<nav class="header-nav">
<button class="nav-link ${_page==='dashboard'?'active':''}" onclick="navigate('dashboard');loadDashboard()">Dashboard</button>
<button class="nav-link ${_page==='principles'||_page==='detail'?'active':''}" onclick="navigate('principles');loadPrinciples()">Principles</button>
</nav>
<div class="header-user">
<span class="user-name">${_user?.full_name||_user?.email||''}</span>
<button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
</div></header>`}

function doLogout(){clearAuth();navigate('login');}

// ── DASHBOARD ─────────────────────────────────────────────────
async function loadDashboard(){
  try{
    _stats=await api('GET','/principles/stats/');
    const r=await api('GET','/principles/?page_size=4');
    _principles=r.results||[];
    render();
  }catch(e){}
}

function renderDashboard(){
  if(!_stats) return`<div class="page-content"><div class="skeleton-grid">${'<div class="skeleton-card"></div>'.repeat(4)}</div></div>`;
  const s=_stats;
  return`<div class="page-content">
<div class="welcome-row">
<div><h1 class="page-title">Welcome, <span class="accent">${_user?.full_name||_user?.email}</span></h1>
<p class="page-sub">${_user?.university||'Your academic dashboard'}</p></div>
<button class="btn btn-primary" onclick="navigate('principles');loadPrinciples();setTimeout(()=>openPrincipleModal(),300)">+ Add Principle</button>
</div>
<div class="stats-grid">
<div class="stat-card"><div class="stat-icon">📚</div><div class="stat-value">${s.total_principles}</div><div class="stat-label">Principles</div></div>
<div class="stat-card accent-card"><div class="stat-icon">🎯</div><div class="stat-value">${s.overall_progress}%</div><div class="stat-label">Overall Progress</div>
<div class="mini-bar-wrap"><div class="mini-bar" style="width:${s.overall_progress}%;background:${getProgressColor(s.overall_progress)}"></div></div></div>
<div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${s.completed_tasks}</div><div class="stat-label">Tasks Done</div></div>
<div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-value">${s.pending_tasks}</div><div class="stat-label">Tasks Pending</div></div>
</div>
${s.by_semester?.length?`<p class="section-title">Progress by Semester</p>
<div class="sem-list">${s.by_semester.map(sem=>{const pct=sem.tasks?Math.round(sem.completed/sem.tasks*100):0;return`
<div class="sem-row"><div class="sem-name">${sem.semester}</div>
<div class="sem-bar-wrap"><div class="sem-bar" style="width:${pct}%;background:${getProgressColor(pct)}"></div></div>
<div class="sem-pct">${pct}%</div>
<div class="sem-meta">${sem.completed}/${sem.tasks} tasks</div></div>`}).join('')}</div>`:''}
${_principles.length?`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
<p class="section-title" style="margin:0">Recent Principles</p>
<button class="link-btn" onclick="navigate('principles');loadPrinciples()">View all →</button></div>
<div class="principles-grid">${_principles.map(p=>renderPrincipleCard(p)).join('')}</div>`:''}
${!s.total_principles?`<div style="text-align:center;padding:60px 20px"><div class="empty-icon">🎓</div><h3 style="font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:8px">Nothing here yet</h3><p style="color:var(--muted);margin-bottom:20px">Add your first principle to start tracking</p><button class="btn btn-primary" onclick="navigate('principles');loadPrinciples();setTimeout(()=>openPrincipleModal(),300)">Get Started</button></div>`:''}
</div>`}

// ── PRINCIPLES ────────────────────────────────────────────────
async function loadPrinciples(){
  try{
    let url='/principles/?';
    if(_filterSearch) url+='search='+encodeURIComponent(_filterSearch)+'&';
    if(_filterArchived) url+='is_archived=true&';
    const r=await api('GET',url);
    _principles=r.results||[];
    render();
  }catch(e){}
}

function renderPrincipleCard(p){
  const c=getProgressColor(p.progress_percentage);
  return`<div class="principle-card">
<div class="card-strip" style="background:${p.color}"></div>
<div class="card-body">
<div class="card-top">
<div class="card-info"><div class="card-name">${esc(p.name)}</div>
<div>${p.semester?`<span class="semester-tag">${esc(p.semester)}</span>`:''}${p.is_archived?'<span class="archived-tag">Archived</span>':''}</div></div>
<div class="card-actions">
<button class="icon-btn" onclick="openPrincipleModal(${JSON.stringify(p).split('"').join('&quot;')})" title="Edit">✎</button>
<button class="icon-btn" onclick="toggleArchive(${p.id})" title="${p.is_archived?'Unarchive':'Archive'}">${p.is_archived?'📂':'🗂️'}</button>
<button class="icon-btn danger" onclick="deletePrinciple(${p.id},'${esc(p.name)}')" title="Delete">✕</button>
</div></div>
${p.description?`<p class="card-desc">${esc(p.description)}</p>`:''}
<div class="card-progress"><div class="mini-bar-wrap" style="flex:1"><div class="mini-bar" style="width:${p.progress_percentage}%;background:${c}"></div></div>
<span class="pct-label" style="color:${c}">${p.progress_percentage}%</span></div>
<div class="card-footer"><span class="meta-chip">${p.completed_task_count}/${p.task_count} tasks</span>
<button class="link-btn" onclick="loadDetail(${p.id})">View tasks →</button></div>
</div></div>`}

function renderPrinciples(){
  return`<div class="page-content">
<div class="welcome-row"><div><h1 class="page-title">Principles</h1>
<p class="page-sub">${_principles.length} subject${_principles.length!==1?'s':''} tracked</p></div>
<button class="btn btn-primary" onclick="openPrincipleModal()">+ Add Principle</button></div>
<div class="filter-bar">
<input class="search-input" placeholder="🔍 Search…" value="${esc(_filterSearch)}" oninput="_filterSearch=this.value;loadPrinciples()">
<label class="toggle-label"><input type="checkbox" ${_filterArchived?'checked':''} onchange="_filterArchived=this.checked;loadPrinciples()"> Show archived</label>
</div>
<div class="principles-grid">
${_principles.length?_principles.map(p=>renderPrincipleCard(p)).join(''):`<div class="empty-state"><div class="empty-icon">📋</div><h3>${_filterSearch?'No results':'No principles yet'}</h3><p>${_filterSearch?'Try different search':'Click "+ Add Principle" to get started'}</p></div>`}
</div></div>`}

async function toggleArchive(id){
  try{const r=await api('POST',`/principles/${id}/archive/`);toast(r.is_archived?'Archived.':'Unarchived.','info');loadPrinciples();}
  catch(e){toast('Failed','error');}
}

async function deletePrinciple(id,name){
  if(!confirm(`Delete "${name}" and all its tasks?`)) return;
  try{await api('DELETE',`/principles/${id}/`);toast('Principle deleted.');loadPrinciples();}
  catch(e){toast('Could not delete','error');}
}

// ── PRINCIPLE MODAL ───────────────────────────────────────────
function openPrincipleModal(p){
  _editingPrinciple=p||null;
  _showPrincipalModal=true;
  render();
  setTimeout(()=>document.getElementById('pm-name')?.focus(),50);
}

function closePrincipleModal(){_showPrincipalModal=false;_editingPrinciple=null;render();}

function renderPrincipleModal(){
  const p=_editingPrinciple;
  const selColor=p?.color||COLORS[0];
  return`<div class="modal-overlay" onclick="closePrincipleModal()">
<div class="modal" onclick="event.stopPropagation()">
<h2 class="modal-title">${p?'Edit Principle':'New Principle'}</h2>
<div id="pm-err" style="color:var(--danger);font-size:.8rem;margin-bottom:10px"></div>
<div class="form-group"><label class="form-label">Name *</label>
<input class="form-input" id="pm-name" value="${esc(p?.name||'')}" placeholder="e.g. Calculus, Physics I…"></div>
<div class="form-group"><label class="form-label">Description</label>
<textarea class="form-input" id="pm-desc" rows="2" placeholder="Optional notes…">${esc(p?.description||'')}</textarea></div>
<div class="form-group"><label class="form-label">Semester</label>
<select class="form-input" id="pm-sem">
<option value="">— None —</option>
${SEMS.map(s=>`<option value="${s}" ${p?.semester===s?'selected':''}>${s}</option>`).join('')}
</select></div>
<div class="form-group"><label class="form-label">Color</label>
<div class="color-row" id="pm-colors">
${COLORS.map(c=>`<div class="color-swatch ${c===selColor?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectPMColor('${c}')"></div>`).join('')}
</div></div>
<div class="modal-actions">
<button class="btn btn-ghost" onclick="closePrincipleModal()">Cancel</button>
<button class="btn btn-primary" onclick="savePrinciple()">Save</button>
</div></div></div>`}

function selectPMColor(c){document.querySelectorAll('#pm-colors .color-swatch').forEach(s=>{s.classList.toggle('selected',s.dataset.color===c)})}

async function savePrinciple(){
  const name=document.getElementById('pm-name').value.trim();
  if(!name){document.getElementById('pm-err').textContent='Name is required';return;}
  const data={name,description:document.getElementById('pm-desc').value.trim(),
    semester:document.getElementById('pm-sem').value,
    color:document.querySelector('#pm-colors .selected')?.dataset.color||COLORS[0]};
  try{
    if(_editingPrinciple) await api('PATCH',`/principles/${_editingPrinciple.id}/`,data);
    else await api('POST','/principles/',data);
    toast('Principle saved!');closePrincipleModal();loadPrinciples();
  }catch(ex){const msg=Object.values(ex||{}).flat().join(' ');document.getElementById('pm-err').textContent=msg||'Failed to save';}
}

// ── DETAIL PAGE ───────────────────────────────────────────────
async function loadDetail(id){
  _page='detail';_currentPrinciple=null;_filterDone=null;_editingTaskId=null;
  render();
  try{_currentPrinciple=await api('GET',`/principles/${id}/`);render();}
  catch(e){toast('Failed to load','error');}
}

function renderDetail(){
  const p=_currentPrinciple;
  if(!p) return`<div class="page-content"><div class="skeleton-card" style="height:200px;margin-bottom:16px"></div>${'<div class="skeleton-card" style="height:60px;margin-bottom:8px"></div>'.repeat(3)}</div>`;
  const tasks=p.tasks||[];
  const filtered=_filterDone===null?tasks:tasks.filter(t=>t.is_done===_filterDone);
  const done=tasks.filter(t=>t.is_done).length;
  const pending=tasks.length-done;
  const c=getProgressColor(p.progress_percentage);
  return`<div class="page-content">
<button class="back-link" onclick="navigate('principles');loadPrinciples()">← Principles</button>
<div class="detail-header">
<div class="detail-title-row"><div class="color-dot" style="background:${p.color}"></div>
<h1 class="page-title">${esc(p.name)}</h1>
${p.semester?`<span class="semester-tag">${esc(p.semester)}</span>`:''}
${p.is_archived?'<span class="archived-tag">Archived</span>':''}</div>
${p.description?`<p class="page-sub">${esc(p.description)}</p>`:''}
</div>
<div class="detail-progress-card">
<div class="dp-label">Progress</div>
<div class="dp-row"><div class="big-bar-wrap"><div class="big-bar" style="width:${p.progress_percentage}%;background:${c}"></div></div>
<div class="dp-pct" style="color:${c}">${p.progress_percentage}%</div></div>
<div class="dp-meta">${done} done · ${pending} pending · ${tasks.length} total</div>
</div>
${!p.is_archived?`<div class="add-task-card">
<p class="section-title">Add Task</p>
<div class="add-task-row">
<input class="form-input" id="nt-text" placeholder="Describe the task…" onkeydown="if(event.key==='Enter')addTask(${p.id})">
<select class="form-input priority-select" id="nt-prio">
<option value="medium">Medium</option><option value="low">Low</option><option value="high">High</option>
</select>
<input class="form-input due-input" type="date" id="nt-due" title="Due date">
<button class="btn btn-primary" onclick="addTask(${p.id})">+ Add</button>
</div></div>`:''}
<div class="filter-bar">
<button class="filter-btn ${_filterDone===null?'active':''}" onclick="_filterDone=null;render()">All (${tasks.length})</button>
<button class="filter-btn ${_filterDone===false?'active':''}" onclick="_filterDone=false;render()">Pending (${pending})</button>
<button class="filter-btn ${_filterDone===true?'active':''}" onclick="_filterDone=true;render()">Done (${done})</button>
</div>
<div class="task-list">
${filtered.length?filtered.map(t=>renderTask(t,p)).join(''):`<div style="text-align:center;padding:30px;color:var(--muted)">No tasks here.</div>`}
</div></div>`}

function renderTask(t,p){
  const priClass={low:'priority-low',medium:'priority-med',high:'priority-high'}[t.priority]||'';
  if(_editingTaskId===t.id){
    return`<div class="task-row">
<input type="checkbox" class="task-check" ${t.is_done?'checked':''} onchange="toggleTask(${t.id},${p.id})">
<div class="task-body">
<input class="task-edit-input" id="te-${t.id}" value="${esc(t.text)}"
  onblur="saveTaskEdit(${t.id},${p.id})"
  onkeydown="if(event.key==='Enter')saveTaskEdit(${t.id},${p.id});if(event.key==='Escape'){_editingTaskId=null;render()}">
</div></div>`}
  return`<div class="task-row ${t.is_done?'task-done':''}">
<input type="checkbox" class="task-check" ${t.is_done?'checked':''} onchange="toggleTask(${t.id},${p.id})">
<div class="task-body">
<span class="task-text" ondblclick="${!p.is_archived?`startEditTask(${t.id})`:''}"> ${esc(t.text)}</span>
<div class="task-meta">
<span class="${priClass}">${t.priority}</span>
${t.due_date?`<span class="due-chip">📅 ${t.due_date}</span>`:''}
${t.done_at?`<span class="done-chip">✓ ${new Date(t.done_at).toLocaleDateString()}</span>`:''}
</div></div>
${!p.is_archived?`<select class="prio-select" onchange="updateTaskPriority(${t.id},${p.id},this.value)">
<option value="low" ${t.priority==='low'?'selected':''}>Low</option>
<option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option>
<option value="high" ${t.priority==='high'?'selected':''}>High</option>
</select>`:''}
<div class="task-actions">
${!p.is_archived?`<button class="icon-btn" onclick="startEditTask(${t.id})" title="Edit">✎</button>`:''}
<button class="icon-btn danger" onclick="deleteTask(${t.id},${p.id})" title="Delete">✕</button>
</div></div>`}

async function addTask(pid){
  const text=document.getElementById('nt-text')?.value.trim();
  if(!text) return;
  const prio=document.getElementById('nt-prio')?.value||'medium';
  const due=document.getElementById('nt-due')?.value||null;
  const body={principle:pid,text,priority:prio};
  if(due) body.due_date=due;
  try{await api('POST','/tasks/',body);toast('Task added!');await loadDetail(pid);}
  catch(e){toast('Failed to add task','error');}
}

async function toggleTask(tid,pid){
  try{await api('POST',`/tasks/${tid}/toggle/`);await loadDetail(pid);}
  catch(e){toast('Failed','error');}
}

function startEditTask(tid){_editingTaskId=tid;render();setTimeout(()=>{const el=document.getElementById('te-'+tid);if(el){el.focus();el.select();}},30);}

async function saveTaskEdit(tid,pid){
  const el=document.getElementById('te-'+tid);
  const text=el?.value.trim();
  _editingTaskId=null;
  if(!text){render();return;}
  try{await api('PATCH',`/tasks/${tid}/`,{text});await loadDetail(pid);}
  catch(e){toast('Failed to update','error');render();}
}

async function updateTaskPriority(tid,pid,priority){
  try{await api('PATCH',`/tasks/${tid}/`,{priority});await loadDetail(pid);}
  catch(e){toast('Failed','error');}
}

async function deleteTask(tid,pid){
  if(!confirm('Delete this task?')) return;
  try{await api('DELETE',`/tasks/${tid}/`);toast('Task deleted.');await loadDetail(pid);}
  catch(e){toast('Failed','error');}
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── INIT ──────────────────────────────────────────────────────
loadAuth();
if(_user){_page='dashboard';render();loadDashboard();}
else{_page='login';render();}

// Enter key on login
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(_page==='login') doLogin();
    else if(_page==='register') doRegister();
  }
  if(e.key==='Escape' && _showPrincipalModal) closePrincipleModal();
});
</script>
</body>
</html>
