services:
  - type: web
    name: unitracker
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi_render:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings_render
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@admin.com
      - key: ADMIN_PASSWORD
        value: admin1234
      - key: PYTHON_VERSION
        value: 3.11.0
